<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
    <title>Aula 3 - HTML+CSS</title>
    <link rel="stylesheet" href="introducao.css"> <!-- link para o arquivo CSS -->
</head>
<body>

    <h1>Olá mundo</h1>

    <p class="fundo-verde letra-branca">esse parágrafo está definido com uma cor verde de fundo</p>

    <div class="borda-verde">
        <p>esse texto tem borda em volta</p>
    </div>

    <a href="https://icmc.usp.br " target="_blank">esse link fica preto quando o mouse passa por cima</a>

    <p id="fonte-sybau" class="letra-areia">hello bro</p>

    <div class="caixa-direita fundo-areia">
        <p>essa caixa está à direita da página e está com fundo com cor areia</p>
    </div>

    <br><br><br><br><br> <!-- pra não ficar o texto do lado esquerdo da caixa à direita -->

    <p class="fundo-verde letra-verde borda-verde">esse texto está ilegível</p>

    <div class="div-centralizada fundo-areia letra-branca borda-verde">
        <p>div centralizada</p>
    </div>


</body>

</html>
